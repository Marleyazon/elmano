<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ElmañoOficìal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; margin: 0; }
        #sideBar { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: #eee; overflow-x: hidden; transition: 0.3s; padding-top: 60px; border-right: 1px solid #ccc; z-index: 10; }
        #sideBar button { display: block; width: 100%; padding: 15px; text-align: left; border: none; background: none; font-size: 18px; cursor: pointer; }
        .sub-btn { padding-left: 40px !important; font-size: 16px !important; color: #555; }
        .close-btn { position: absolute; top: 0; right: 10px; font-size: 30px; cursor: pointer; }
        .content { padding: 20px; }
        .page { display: none; }
        .active { display: block; }
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .box { border: 1px solid #000; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <button onclick="toggleSideBar()">...</button>

    <div id="sideBar">
        <span class="close-btn" onclick="toggleSideBar()">&times;</span>
        <button onclick="showPage('menu')">Menu</button>
        <button onclick="showPage('histoire')">Histoire</button>
        <button onclick="showPage('exercices')">Exercices</button>
        <button onclick="showPage('infos')">Infos</button>
        <button class="sub-btn" onclick="showPage('infos')">Infos</button>
        <button class="sub-btn" onclick="showPage('mises-a-jour')">Mises a jour</button>
    </div>

    <div id="menu" class="page active content">
        <div class="nav-bar">
            <button onclick="showPage('menu')">Menu</button>
            <button onclick="showPage('liens')">Liens</button>
        </div>
    </div>

    <div id="liens" class="page content">
        <h3>Livres d'exercices :</h3>
        <ul>
            <li><a href="https://read.bookcreator.com/Cx7Su8cUCWV4uJO2vjHDS5YmUOm1/1ENUrkYhQRer5VCb7uszsg">Lien 1</a></li>
            <li><a href="https://read.bookcreator.com/Cx7Su8cUCWV4uJO2vjHDS5YmUOm1/e4FLXjOAQA2p7O23D7UFOQ">Lien 2</a></li>
        </ul>
        <h3>Agenda :</h3>
        <ul>
            <li><a href="https://limto.my.canva.site/jeremi">Lien 3</a></li>
        </ul>
    </div>

    <div id="infos" class="page content">
        <div class="nav-bar">
            <button onclick="showPage('infos')">Infos</button>
            <button onclick="showPage('mises-a-jour')">Mises a jour</button>
        </div>
        <h1>Infos</h1>
    </div>

    <div id="mises-a-jour" class="page content">
        <h1>Mises a jour</h1>
        <div class="box">
            <strong>1.0 : Début de l'application Elmaño.</strong><br>
            - Découvrer nos 3 sites et naviguer.
        </div>
        <div class="box">
            <strong>1.1 : Mise à jour.</strong><br>
            Infos, histoires et exercices rajoutaient.
        </div>
    </div>

    <div id="histoire" class="page content">
        <h1 style="text-align: center; margin-top: 20%;">DER</h1>
    </div>

    <div id="exercices" class="page content">
        <h1>Exercices</h1>
    </div>

    <script>
        function toggleSideBar() {
            const sb = document.getElementById("sideBar");
            sb.style.width = sb.style.width === "250px" ? "0" : "250px";
        }
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            if (window.innerWidth < 600) toggleSideBar();
        }
    </script>
</body>
</html>
