<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title data-key="title">ElmañoOficìal</title>
    <style>
        body { font-family: sans-serif; margin: 0; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        #sideBar { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: #eee; overflow-x: hidden; transition: 0.3s; padding-top: 60px; z-index: 10; }
        #sideBar button { display: block; width: 100%; padding: 15px; border: none; background: none; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body onload="changeLang('el')">

    <button onclick="toggleSideBar()">MENU</button>

    <div id="sideBar">
        <button onclick="showPage('menu')" data-key="menu">Menù</button>
        <button onclick="showPage('exercices')" data-key="exercices">Ejercicios</button>
        <button onclick="showPage('parametres')" data-key="parametres">Parametras</button>
    </div>

    <div id="menu" class="page active">
        <h3 data-key="cursos">Cùrsos :</h3>
        <a id="link1" href="https://youtu.be/tQWN9DhKSm0" data-key="admar">Admar o cùrso.</a>
    </div>

    <div id="exercices" class="page">
        <h1 data-key="exercices">Ejercicios</h1>
        <h3 data-key="presentare">Presentaré</h3>
        <p data-key="p1">1) Presentaré.</p>
    </div>

    <div id="parametres" class="page">
        <h3 data-key="lenjuas">Lenjùas:</h3>
        <button onclick="changeLang('fr')">Français</button>
        <button onclick="changeLang('el')">Elmaño</button>
        <button onclick="changeLang('en')">English</button>
        <button onclick="changeLang('es')">Español</button>
        <button onclick="changeLang('pt')">Português</button>
        <button onclick="changeLang('ca')">Català</button>
        <button onclick="changeLang('ru')">Русский</button>
        <button onclick="changeLang('ja')">日本語</button>
        <h3 data-key="musique">Mùsica</h3>
        <button onclick="document.getElementById('bgMusic').play()" data-key="act_musique">Activar la mùsica</button>
    </div>

    <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <script>
        const dict = {
            'el': { 'title': 'ElmañoOficìal', 'menu': 'Menù', 'exercices': 'Ejercicios', 'parametres': 'Parametras', 'cursos': 'Cùrsos :', 'admar': 'Admar o cùrso.', 'presentare': 'Presentaré', 'p1': '1) Presentaré.', 'lenjuas': 'Lenjùas:', 'musique': 'Mùsica', 'act_musique': 'Activar la mùsica' },
            'fr': { 'title': 'ElmañoOficìal', 'menu': 'Menu', 'exercices': 'Exercices', 'parametres': 'Parametres', 'cursos': 'Cours :', 'admar': 'Acceder au cours', 'presentare': 'Presente toi', 'p1': '1) Presente toi.', 'lenjuas': 'Langues :', 'musique': 'Musique', 'act_musique': 'Activer la musique' },
            'en': { 'title': 'ElmañoOfficial', 'menu': 'Menu', 'exercices': 'Exercises', 'parametres': 'Settings', 'cursos': 'Courses:', 'admar': 'Access course', 'presentare': 'Introduce yourself', 'p1': '1) Introduce yourself.', 'lenjuas': 'Languages:', 'musique': 'Music', 'act_musique': 'Enable music' },
            'es': { 'title': 'ElmañoOficial', 'menu': 'Menú', 'exercices': 'Ejercicios', 'parametres': 'Ajustes', 'cursos': 'Cursos:', 'admar': 'Acceder al curso', 'presentare': 'Presentarse', 'p1': '1) Preséntate.', 'lenjuas': 'Idiomas:', 'musique': 'Música', 'act_musique': 'Activar música' },
            'pt': { 'title': 'ElmañoOficial', 'menu': 'Menu', 'exercices': 'Exercícios', 'parametres': 'Configurações', 'cursos': 'Cursos:', 'admar': 'Acessar curso', 'presentare': 'Apresente-se', 'p1': '1) Apresente-se.', 'lenjuas': 'Idiomas:', 'musique': 'Música', 'act_musique': 'Ativar música' },
            'ca': { 'title': 'ElmañoOficial', 'menu': 'Menú', 'exercices': 'Exercicis', 'parametres': 'Configuració', 'cursos': 'Curs:', 'admar': 'Accedir al curs', 'presentare': 'Presenta\'t', 'p1': '1) Presenta\'t.', 'lenjuas': 'Llengües:', 'musique': 'Música', 'act_musique': 'Activar música' },
            'ru': { 'title': 'ElmañoOfficial', 'menu': 'Меню', 'exercices': 'Упражнения', 'parametres': 'Настройки', 'cursos': 'Курс:', 'admar': 'Перейти', 'presentare': 'Представьтесь', 'p1': '1) Представьтесь.', 'lenjuas': 'Языки:', 'musique': 'Музыка', 'act_musique': 'Включить музыку' },
            'ja': { 'title': 'ElmañoOfficial', 'menu': 'メニュー', 'exercices': '演習', 'parametres': '設定', 'cursos': 'コース:', 'admar': 'コース', 'presentare': '自己紹介', 'p1': '1) 自己紹介する。', 'lenjuas': '言語:', 'musique': '音楽', 'act_musique': '音楽を有効化' }
        };

        function changeLang(lang) {
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if(dict[lang] && dict[lang][key]) el.innerText = dict[lang][key];
            });
        }
        function toggleSideBar() { const sb = document.getElementById("sideBar"); sb.style.width = sb.style.width === "250px" ? "0" : "250px"; }
        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); toggleSideBar(); }
    </script>
</body>
</html>
