<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ElmañoOficìal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .menu-container { position: relative; display: inline-block; }
        .menu-content { display: none; border: 1px solid #000; padding: 10px; background: #fff; }
        .sub-group { margin-top: 10px; }
        .visible { display: block; }
    </style>
</head>
<body>

    <h1>Bienvenue sur Elmaño</h1>

    <!-- Le bouton 3 petits points -->
    <div class="menu-container">
        <button onclick="toggleMenu()">...</button>
        
        <div id="mainMenu" class="menu-content">
            <!-- Bouton Menu -->
            <div><button>Menu</button></div>

            <!-- Bouton Liens -->
            <div class="sub-group">
                <button>Liens</button>
                <ul>
                    <li>Livres d'exercices</li>
                    <li>Agenda</li>
                </ul>
            </div>

            <!-- Bouton Infos -->
            <div class="sub-group">
                <button>Infos</button>
                <button>Mises à jour</button>
            </div>

            <!-- Bouton Histoire -->
            <div class="sub-group">
                <button>Histoire</button>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById("mainMenu").classList.toggle("visible");
        }
    </script>

</body>
</html>
