<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ElmañoOficìal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; margin: 0; }
        /* Style de la bande laterale */
        #sideBar { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: #eee; overflow-x: hidden; transition: 0.3s; padding-top: 60px; border-right: 1px solid #ccc; }
        #sideBar button { display: block; width: 100%; padding: 20px; text-align: left; border: none; background: none; font-size: 18px; cursor: pointer; }
        .close-btn { position: absolute; top: 0; right: 10px; font-size: 30px; cursor: pointer; }
        
        /* Contenu principal */
        .content { padding: 20px; }
        .menu-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .page { display: none; }
        .active { display: block; }
    </style>
</head>
<body>

    <button onclick="toggleSideBar()">...</button>

    <div id="sideBar">
        <span class="close-btn" onclick="toggleSideBar()">&times;</span>
        <button onclick="showPage('menu')">Menu</button>
        <button onclick="showPage('histoire')">Histoire</button>
        <button onclick="showPage('exercices')">Exercices</button>
    </div>

    <div id="menu" class="page active content">
        <div class="menu-bar">
            <button>Menu</button>
            <button>Liens</button>
        </div>
        
        <h3>Livres d'exercices :</h3>
        <ul>
            <li><a href="https://read.bookcreator.com/Cx7Su8cUCWV4uJO2vjHDS5YmUOm1/1ENUrkYhQRer5VCb7uszsg">Lien 1</a></li>
            <li><a href="https://read.bookcreator.com/Cx7Su8cUCWV4uJO2vjHDS5YmUOm1/e4FLXjOAQA2p7O23D7UFOQ">Lien 2</a></li>
        </ul>
        
        <h3>Agenda :</h3>
        <ul>
            <li><a href="https://limto.my.canva.site/jeremi">Lien 3</a></li>
        </ul>
    </div>

    <div id="histoire" class="page content">
        <h1 style="text-align: center; margin-top: 20%;">DER</h1>
    </div>

    <div id="exercices" class="page content">
        <h1>Exercices</h1>
        <p>Rien pour l'instant.</p>
    </div>

    <script>
        function toggleSideBar() {
            const sb = document.getElementById("sideBar");
            sb.style.width = sb.style.width === "250px" ? "0" : "250px";
        }
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            toggleSideBar();
        }
    </script>
</body>
</html>
