<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ElmañoOficìal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; margin: 0; }
        #sideBar { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: #eee; overflow-x: hidden; transition: 0.3s; padding-top: 60px; border-right: 1px solid #ccc; z-index: 10; }
        #sideBar button { display: block; width: 100%; padding: 15px; text-align: left; border: none; background: none; font-size: 18px; cursor: pointer; }
        .close-btn { position: absolute; top: 0; right: 10px; font-size: 30px; cursor: pointer; }
        .content { padding: 20px; }
        .page { display: none; }
        .active { display: block; }
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .box { border: 1px solid #000; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; margin-top: 10px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4CAF50; }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body onload="changeLang('el'); toggleLinks()">

    <button onclick="toggleSideBar()">...</button>

    <div id="sideBar">
        <span class="close-btn" onclick="toggleSideBar()">&times;</span>
        <button onclick="showPage('menu')" data-key="menu">Menù</button>
        <button onclick="showPage('histoire')" data-key="histoire">Historìa</button>
        <button onclick="showPage('exercices')" data-key="exercices">Ejercicios</button>
        <button onclick="showPage('parametres')" data-key="parametres">Parametras</button>
        <button onclick="showPage('infos')" data-key="infos">Informationes</button>

    <div id="menu" class="page active content">

        <p data-key="v2">2) Conjùje la verbe avèr.</p>
        <p data-key="v3">3) Conjùje la verbe aller.</p>
        <h3 data-key="presentare">Presentaré</h3>
        <p data-key="p1">1) Présente toi.</p>
        <p data-key="p2">2) Fer uña maìsone Dimentiòn2 avèc las zé pieças en Elmaño.</p>
    </div>

    <div id="parametres" class="page content">

        <button onclick="changeLang('ca')">Català</button>

        };

        function changeLang(lang) { document.querySelectorAll('[data-key]').forEach(el => { const key = el.getAttribute('data-key'); if(dict[lang] && dict[lang][key]) el.innerText = dict[lang][key]; }); }
        function toggleSideBar() { const sb = document.getElementById("sideBar"); sb.style.width = sb.style.width === "250px" ? "0" : "250px"; }
        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById("sideBar").style.width = "0"; }
    </script>
</body>
</html>
