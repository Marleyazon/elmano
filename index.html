<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title data-key="title">ElmañoOficìal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; margin: 0; }
        #sideBar { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: #eee; overflow-x: hidden; transition: 0.3s; padding-top: 60px; border-right: 1px solid #ccc; z-index: 10; }
        #sideBar button { display: block; width: 100%; padding: 15px; text-align: left; border: none; background: none; font-size: 18px; cursor: pointer; }
        .close-btn { position: absolute; top: 0; right: 10px; font-size: 30px; cursor: pointer; }
        .content { padding: 20px; }
        .page { display: none; }
        .active { display: block; }
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .box { border: 1px solid #000; padding: 15px; margin-bottom: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <button onclick="toggleSideBar()">...</button>

    <div id="sideBar">
        <span class="close-btn" onclick="toggleSideBar()">&times;</span>
        <button onclick="showPage('menu')" data-key="menu">Menù</button>
        <button onclick="showPage('histoire')" data-key="histoire">Historìa</button>
        <button onclick="showPage('exercices')" data-key="exercices">Ejercicios</button>
        <button onclick="showPage('parametres')" data-key="parametres">Parametras</button>
        <button onclick="showPage('infos')" data-key="infos">Informationes</button>
    </div>

    <div id="menu" class="page active content">
        <div class="nav-bar">
            <button onclick="showPage('menu')" data-key="menu">Menù</button>
            <button onclick="showPage('liens')" data-key="sorteados">Sortéados</button>
        </div>
        <h3 data-key="cursos">Cùrsos :</h3>
        <p data-key="desc">Cùrso nº1 en Elmaño : Debùtante A0+.</p>
        <a href="https://youtu.be/tQWN9DhKSm0?is=GxuLTuiI-_QzwO97" data-key="admar">Admar o cùrso.</a>
    </div>

    <div id="liens" class="page content">
        <div class="nav-bar">
            <button onclick="showPage('menu')" data-key="menu">Menù</button>
            <button onclick="showPage('liens')" data-key="sorteados">Sortéados</button>
        </div>
        <h3 data-key="livres">Libre de del ejercicios</h3>
        <h3 data-key="agenda">Ajenda</h3>
    </div>

    <div id="infos" class="page content">
        <div class="nav-bar">
            <button onclick="showPage('infos')" data-key="infos">Informationes</button>
            <button onclick="showPage('mises-a-jour')" data-key="maj">Mise a jue</button>
        </div>
        <h1 data-key="infos">Informationes</h1>
    </div>

    <div id="mises-a-jour" class="page content">
        <div class="nav-bar">
            <button onclick="showPage('infos')" data-key="infos">Informationes</button>
            <button onclick="showPage('mises-a-jour')" data-key="maj">Mise a jue</button>
        </div>
        <h1 data-key="maj">Mise a jue</h1>
        <div class="box"><strong data-key="v10">1.0 : Jo assé de la aplicatìon Elmaño.</strong><br><span data-key="desc10">- Decùvrar dis 3 daqs e navijar.</span></div>
        <div class="box"><strong data-key="v11">1.1 : Mise a jue.</strong><br><span data-key="desc11">Informationes, historias e ejercicios plùsarée.</span></div>
    </div>

    <div id="parametres" class="page content">
        <h3 data-key="lenjuas">Lenjùas:</h3>
        <button onclick="changeLang('fr')">Français</button>
        <button onclick="changeLang('el')">Elmaño</button>
        <button onclick="changeLang('en')">English</button>
        <button onclick="changeLang('es')">Español</button>
        <button onclick="changeLang('pt')">Português</button>
        <button onclick="changeLang('ca')">Català</button>
        <button onclick="changeLang('ru')">Русский</button>
        <button onclick="changeLang('ja')">日本語</button>
    </div>

    <div id="histoire" class="page content"><h1 style="text-align: center; margin-top: 20%;">DER</h1></div>
    <div id="exercices" class="page content"><h1 data-key="exercices">Ejercicios</h1></div>

    <script>
        const dict = {
            'el': { 'title': 'ElmañoOficìal', 'menu': 'Menù', 'histoire': 'Historìa', 'exercices': 'Ejercicios', 'parametres': 'Parametras', 'infos': 'Informationes', 'sorteados': 'Sortéados', 'maj': 'Mise a jue', 'cursos': 'Cùrsos :', 'desc': 'Cùrso nº1 en Elmaño : Debùtante A0+.', 'admar': 'Admar o cùrso.', 'livres': 'Libre de del ejercicios', 'agenda': 'Ajenda', 'lenjuas': 'Lenjùas:', 'v10': '1.0 : Jo assé de la aplicatìon Elmaño.', 'desc10': '- Decùvrar dis 3 daqs e navijar.', 'v11': '1.1 : Mise a jue.', 'desc11': 'Informationes, historias e ejercicios plùsarée.' },
            'en': { 'title': 'ElmañoOfficial', 'menu': 'Menu', 'histoire': 'History', 'exercices': 'Exercises', 'parametres': 'Settings', 'infos': 'Information', 'sorteados': 'Sorted', 'maj': 'Updates', 'cursos': 'Courses:', 'desc': 'Course n°1 in Elmaño: Beginner A0+', 'admar': 'Access course', 'livres': 'Exercise books', 'agenda': 'Agenda', 'lenjuas': 'Languages:', 'v10': '1.0: Elmaño app start.', 'desc10': '- Discover 3 sites and navigate.', 'v11': '1.1: Update.', 'desc11': 'Info, history and exercises added.' }
        };

        function changeLang(lang) { if(lang === 'fr') { location.reload(); return; } document.querySelectorAll('[data-key]').forEach(el => { const key = el.getAttribute('data-key'); if(dict[lang] && dict[lang][key]) el.innerText = dict[lang][key]; }); }
        function toggleSideBar() { const sb = document.getElementById("sideBar"); sb.style.width = sb.style.width === "250px" ? "0" : "250px"; }
        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById("sideBar").style.width = "0"; }
    </script>
</body>
</html>
