<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title id="title">ElmañoOficìal</title>
    <style>
        body { font-family: sans-serif; margin: 0; }
        #sideBar { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: #eee; transition: 0.3s; padding-top: 60px; z-index: 10; }
        #sideBar button { display: block; width: 100%; padding: 15px; text-align: left; border: none; background: none; font-size: 18px; cursor: pointer; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
    </style>
</head>
<body>

    <button onclick="toggleSideBar()">...</button>

    <div id="sideBar">
        <button onclick="showPage('menu')" data-key="menu">Menu</button>
        <button onclick="showPage('histoire')" data-key="histoire">Histoire</button>
        <button onclick="showPage('exercices')" data-key="exercices">Exercices</button>
        <button onclick="showPage('parametres')" data-key="parametres">Paramètres</button>
        <button onclick="showPage('infos')" data-key="infos">Infos</button>
    </div>

    <div id="menu" class="page active">
        <h3 data-key="cours">Cours :</h3>
        <p data-key="desc">Cùrso n°1 en Elmaño : Debùtante A0+.</p>
    </div>

    <div id="parametres" class="page">
        <h3 data-key="langue">Langue :</h3>
        <button onclick="changeLang('fr')">Français</button>
        <button onclick="changeLang('en')">English</button>
        <button onclick="changeLang('es')">Español</button>
        <button onclick="changeLang('pt')">Português</button>
        <button onclick="changeLang('ca')">Català</button>
        <button onclick="changeLang('ru')">Русский</button>
        <button onclick="changeLang('ja')">日本語</button>
    </div>

    <script>
        const dict = {
            'en': { 'menu': 'Menu', 'histoire': 'History', 'exercices': 'Exercises', 'parametres': 'Settings', 'infos': 'Info', 'cours': 'Course:', 'desc': 'Course n°1 in Elmaño: Beginner A0+', 'langue': 'Language:' },
            'es': { 'menu': 'Menú', 'histoire': 'Historia', 'exercices': 'Ejercicios', 'parametres': 'Ajustes', 'infos': 'Info', 'cours': 'Curso:', 'desc': 'Curso n°1 en Elmaño: Principiante A0+', 'langue': 'Idioma:' },
            'pt': { 'menu': 'Menu', 'histoire': 'História', 'exercices': 'Exercícios', 'parametres': 'Configurações', 'infos': 'Info', 'cours': 'Curso:', 'desc': 'Curso n°1 em Elmaño: Iniciante A0+', 'langue': 'Idioma:' },
            'ca': { 'menu': 'Menú', 'histoire': 'Història', 'exercices': 'Exercicis', 'parametres': 'Configuració', 'infos': 'Info', 'cours': 'Curs:', 'desc': 'Curs núm. 1 en Elmaño: Principiant A0+', 'langue': 'Llengua:' },
            'ru': { 'menu': 'Меню', 'histoire': 'История', 'exercices': 'Упражнения', 'parametres': 'Настройки', 'infos': 'Информация', 'cours': 'Курс:', 'desc': 'Курс №1 на Elmaño: Новичок A0+', 'langue': 'Язык:' },
            'ja': { 'menu': 'メニュー', 'histoire': '歴史', 'exercices': '演習', 'parametres': '設定', 'infos': '情報', 'cours': 'コース:', 'desc': 'ElmañoコースNo.1: 初級A0+', 'langue': '言語:' }
        };

        function changeLang(lang) {
            if(lang === 'fr') location.reload(); 
            document.querySelectorAll('[data-key]').forEach(el => {
                const key = el.getAttribute('data-key');
                if(dict[lang][key]) el.innerText = dict[lang][key];
            });
        }
        function toggleSideBar() { const sb = document.getElementById("sideBar"); sb.style.width = sb.style.width === "250px" ? "0" : "250px"; }
        function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); document.getElementById("sideBar").style.width = "0"; }
    </script>
</body>
</html>
